name: Weekly Growth Signals Report

on:
  schedule:
    # Every Monday at 09:00 SGT = 01:00 UTC Monday
    - cron: '0 1 * * 1'
  workflow_dispatch:
    inputs:
      window_days:
        description: '分析窗口天数（默认30）'
        required: false
        default: '30'
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy-growth:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required files
        run: |
          echo "=== Checking required files ==="
          for f in requirements.txt scripts/growth_signals.py scripts/update_dashboard.py scripts/restore_archive.py; do
            if [ ! -f "$f" ]; then
              echo "❌ MISSING: $f"
              exit 1
            else
              echo "✅ Found: $f"
            fi
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore history from live Pages site
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          echo "=== Restoring docs/archive/ + docs/data/ history (needed for 30-day trend analysis) ==="
          python scripts/restore_archive.py

      # ── Growth signals MUST run before the daily regen step below ──
      # It writes docs/data/growth_fragment.html + growth.json. If
      # docs/index.html doesn't exist yet at this point (normal — the daily
      # script hasn't run yet this session), the splice step harmlessly
      # skips itself; update_dashboard.py picks up the fresh fragment file
      # from disk a moment later regardless, so the final index.html still
      # ends up correct either way.
      - name: Generate growth signals report
        env:
          WINDOW_DAYS: ${{ github.event.inputs.window_days || '30' }}
        run: |
          echo "=== Generating 增长信号周报 (window=${WINDOW_DAYS} days) ==="
          python scripts/growth_signals.py
          echo "Growth signals fragment generated ✅"

      # ── Regenerate the combined single-page dashboard ──
      # This embeds the growth fragment just written above into the same
      # docs/index.html that the daily workflow also produces — there is
      # only ONE live page, with the daily content and growth report as
      # two tabs inside it.
      - name: Regenerate combined dashboard (daily tab + growth tab)
        env:
          SKIP_NETWORK: 'false'
          LOOKBACK_HOURS: '48'
          TIMEZONE_GRACE_HOURS: '12'
          REDDIT_CLIENT_ID:     ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT:    ${{ secrets.REDDIT_USER_AGENT }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/update_dashboard.py --lookback-hours "${LOOKBACK_HOURS}"
          echo "Combined dashboard regenerated ✅"

      - name: Verify output files
        run: |
          echo "=== Verifying output ==="
          if [ ! -f "docs/index.html" ]; then
            echo "❌ docs/index.html not found — this would publish a broken site, aborting."
            exit 1
          fi
          echo "✅ docs/index.html exists ($(wc -c < docs/index.html) bytes)"

          if [ -f "docs/data/growth_fragment.html" ]; then
            echo "✅ docs/data/growth_fragment.html exists ($(wc -c < docs/data/growth_fragment.html) bytes)"
          else
            echo "⚠️ growth_fragment.html missing — growth tab will show placeholder, not blocking deploy"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
